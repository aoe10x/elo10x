name: Relic API Crawl & ELO Update

on:
  schedule:
    # Run once every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Relic API Crawl
        run: pnpm run crawl --limit 50 --months 3

      - name: Recalculate ELO Leaderboards
        run: pnpm run elo

      - name: Commit and Push Changes to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/db.json docs/data/leaderboard_*.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update matches database and ELO leaderboards [skip ci]"
            git push origin master
          else
            echo "No new matches crawled. Database is up to date."
          fi
