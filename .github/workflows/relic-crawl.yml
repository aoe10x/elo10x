name: Relic API Crawl & ELO Update

on:
  schedule:
    # Run once every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Relic API Crawl
        run: node src/cli.ts crawl --limit 250 --months 3

      - name: Merge Remote Changes
        run: |
          git fetch origin main
          node src/tools/merge_git_databases.ts origin/main

      - name: Recalculate ELO Leaderboards
        run: node src/cli.ts elo

      - name: Commit and Push Changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset --mixed origin/main
          git add docs/data/matches.json docs/data/profiles.json docs/data/crawl_state.json docs/data/crawl_manifest.json docs/reports/
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update matches database [skip ci]"
            git push origin main
          else
            echo "No new matches crawled. Database is up to date."
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
